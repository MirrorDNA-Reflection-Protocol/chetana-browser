    - "within 2 hours"
    - "expire today"
    - "last chance"
    - "final notice"
    - "final warning"
    - "act now"
    - "do it now"
    - "right now"
    - "don't delay"
    - "time sensitive"
    - "deadline"
    - "today only"
    - "hurry"
    - "limited time"
    - "before midnight"
    - "asap"
  hi:
    - "तुरंत"
    - "अभी"
    - "जल्दी"
    - "आज ही"
    - "24 घंटे में"
    - "2 घंटे के अंदर"
    - "अंतिम सूचना"
    - "अंतिम चेतावनी"
    - "आखिरी मौका"
    - "देर मत करो"
    - "जल्दी करो"
    - "समय सीमित है"
    - "आज ही करें"
    - "फौरन"
    - "तत्काल"

# --- Impersonation Signals ---
impersonation_signals:
  - "(?i)(rbi|reserve\\s*bank|sebi)\\s*(notice|order|directive|warning)"
  - "(?i)(police|cyber\\s*cell|cbi|ed|enforcement)\\s*(notice|case|complaint|arrest)"
  - "(?i)(court|tribunal|legal)\\s*(notice|order|summon|warrant)"
  - "(?i)(customs|income\\s*tax|gst)\\s*(notice|penalty|seizure|raid)"
  - "(?i)(narcotics|ncb|drugs).*\\s*(parcel|courier|package|found)"

# --- Threat multipliers ---
# These increase the threat score when found alongside scam patterns
threat_multipliers:
  phone_numbers:
    pattern: "(?:\\+91|0)?[6-9]\\d{9}"
    multiplier: 1.1
    reason: "Contains Indian phone number"
  money_amounts:
    pattern: "₹\\s*[\\d,]+(?:\\.\\d{2})?|(?:Rs\\.?|INR)\\s*[\\d,]+"
    multiplier: 1.15
    reason: "Mentions specific money amount"
  short_urls:
    pattern: "(?:bit\\.ly|tinyurl|goo\\.gl|t\\.co|is\\.gd|cutt\\.ly|shorturl)/"
    multiplier: 1.2
    reason: "Contains shortened URL (hiding destination)"
  action_urls:
    pattern: "(?:click|tap|open|visit)\\s+(?:here|this|the)\\s+(?:link|url|button)"
    multiplier: 1.15
    reason: "Pushes user to click a link"
  deadline_pressure:
    pattern: "(?i)(?:within|before|by)\\s+\\d+\\s*(?:hour|minute|hr|min)"
    multiplier: 1.25
    reason: "Creates artificial time pressure"
