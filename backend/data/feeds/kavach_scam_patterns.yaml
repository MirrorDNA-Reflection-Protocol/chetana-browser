  - ".top"
  - ".click"
  - ".loan"
  - ".win"
  - ".gq"
  - ".cf"
  - ".tk"
  - ".ml"
  - ".ga"
  - ".buzz"
  - ".icu"
  - ".cam"
  - ".work"
  - ".life"
  - ".site"
  - ".online"
  - ".club"
  - ".fun"
  - ".rest"
  - ".monster"

# Known legitimate Indian domains (should NOT flag these alone)
trusted_domains:
  - "sbi.co.in"
  - "onlinesbi.sbi"
  - "hdfcbank.com"
  - "icicibank.com"
  - "axisbank.com"
  - "kotak.com"
  - "npci.org.in"
  - "uidai.gov.in"
  - "aadhaar.gov.in"
  - "india.gov.in"
  - "incometax.gov.in"
  - "epfindia.gov.in"
  - "pmkisan.gov.in"
  - "irctc.co.in"
  - "indiapost.gov.in"
  - "paytm.com"
  - "phonepe.com"
  - "gpay.app"

